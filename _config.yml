title: WattsNear
description: WattsNear is the fastest way to find the closest and cheapest EV chargers near you. Live U.S. DOE NREL data. Free for iPhone & CarPlay. No account, no tracking.
url: https://wattsnear.com
author:
  name: Andrew Porzio
  url: https://wattsnear.com
twitter:
  username: ""
  card: summary_large_image
logo: /favicon.svg

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Pretty URLs for blog posts: /blog/<slug>/
permalink: /blog/:slug/

# Render future-dated posts immediately. GitHub Pages' Jekyll runs on a UTC
# clock; a post dated `2026-05-12 16:00:00 -0400` (= 20:00 UTC) would not be
# published if the build kicks off before that UTC moment. Setting
# `future: true` removes the timing trap entirely so newly-pushed posts go
# live as soon as Jekyll builds, regardless of the front-matter timestamp.
future: false

# Don't run Jekyll on the polished marketing pages — they have no front
# matter and stay as plain static files. Keep blog/_posts/_layouts dynamic.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .DS_Store

# Markdown engine + syntax highlighter (kramdown is GitHub Pages default;
# explicit so future readers know what's in play).
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
