<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://wattsnear.com/#org",
      "name": "WattsNear",
      "url": "https://wattsnear.com/",
      "logo": "https://wattsnear.com/favicon.svg"
    },
    {
      "@type": "WebSite",
      "@id": "https://wattsnear.com/#website",
      "url": "https://wattsnear.com/",
      "name": "WattsNear",
      "publisher": { "@id": "https://wattsnear.com/#org" },
      "inLanguage": "en-US"
    }{%- if page.homepage -%},
    {
      "@type": "SoftwareApplication",
      "@id": "https://wattsnear.com/#app",
      "name": "WattsNear",
      "operatingSystem": "iOS",
      "applicationCategory": "NavigationApplication",
      "url": "https://wattsnear.com/",
      "installUrl": "https://apps.apple.com/app/apple-store/id6762151871?pt=127464251&ct=website&mt=8",
      "screenshot": [
        "https://wattsnear.com/assets/closest.webp",
        "https://wattsnear.com/assets/cheapest.webp",
        "https://wattsnear.com/assets/map.webp"
      ],
      "publisher": { "@id": "https://wattsnear.com/#org" },
      "description": "Find the closest and cheapest EV chargers from the U.S. DOE NREL database. Free on iPhone and CarPlay. No account, no tracking.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    },
    {
      "@type": "FAQPage",
      "mainEntity": [
        {%- for item in site.data.faq -%}
        {
          "@type": "Question",
          "name": {{ item.q | jsonify }},
          "acceptedAnswer": {
            "@type": "Answer",
            "text": {{ item.a | strip_newlines | jsonify }}
          }
        }{%- unless forloop.last -%},{%- endunless -%}
        {%- endfor -%}
      ]
    }
    {%- endif -%}{%- if page.layout == 'post' -%},
    {
      "@type": "BlogPosting",
      "@id": "{{ page.url | absolute_url }}#article",
      "headline": {{ page.title | jsonify }},
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
      "author": {
        "@type": "Person",
        "name": {{ page.author | default: site.author.name | jsonify }}
      },
      "publisher": { "@id": "https://wattsnear.com/#org" },
      "mainEntityOfPage": { "@id": "{{ page.url | absolute_url }}" }{%- if page.image -%},
      "image": "{{ page.image | absolute_url }}"
      {%- endif %}
    },
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://wattsnear.com/" },
        { "@type": "ListItem", "position": 2, "name": "Blog", "item": "https://wattsnear.com/blog/" },
        { "@type": "ListItem", "position": 3, "name": {{ page.title | jsonify }}, "item": "{{ page.url | absolute_url }}" }
      ]
    }
    {%- endif -%}
  ]
}
</script>
