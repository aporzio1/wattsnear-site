name: Fetch Soro Posts

on:
  schedule:
    # Run once a day at 8 AM UTC (4 AM ET)
    - cron: '0 8 * * *'
  workflow_dispatch: # also allow a manual trigger from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Fetch Soro posts
        run: node scripts/fetch-soro-posts.js

      - name: Commit new posts (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "No new posts to commit."
          else
            git commit -m "chore: add Soro blog posts $(date -u +%Y-%m-%d)"
            git push
          fi
